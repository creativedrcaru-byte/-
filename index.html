<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>독서지옥 인증 캘린더</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #687078;
      --line: #d9ded9;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-2: #f2b84b;
      --good: #16803c;
      --warn: #b45309;
      --soft: #eef7f4;
      --shadow: 0 16px 36px rgba(32, 33, 36, 0.09);
      font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
    }

    button, select { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    aside {
      background: #f4f1e8;
      border-right: 1px solid var(--line);
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    main {
      padding: 28px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .mark {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 21px;
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 0 10px;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .person-list {
      display: grid;
      gap: 6px;
    }

    .person {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      cursor: pointer;
      text-align: left;
    }

    .person:hover,
    .person.active {
      background: white;
      border-color: var(--line);
    }

    .person.active {
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.12);
    }

    .person-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      font-size: 14px;
    }

    .badge {
      min-width: 34px;
      height: 26px;
      border-radius: 999px;
      background: #e8e1d0;
      color: #3e3321;
      display: inline-grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
    }

    .badge.ok {
      background: #d9f2df;
      color: var(--good);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 20px;
    }

    .topbar h2 {
      font-size: 28px;
      line-height: 1.15;
    }

    .selected-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      padding: 9px 13px;
      color: var(--muted);
      font-size: 13px;
      max-width: 100%;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      min-height: 58px;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h3 {
      font-size: 16px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .calendar {
      padding: 16px;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekdays {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }

    .day {
      min-height: 90px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf9;
      padding: 9px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
    }

    .day.empty {
      background: transparent;
      border-color: transparent;
    }

    .day.hit {
      background: var(--soft);
      border-color: rgba(15, 118, 110, 0.45);
    }

    .day.multi {
      background: #fff6df;
      border-color: rgba(242, 184, 75, 0.8);
    }

    .num {
      font-weight: 800;
      font-size: 13px;
    }

    .names {
      display: flex;
      flex-wrap: wrap;
      align-content: start;
      gap: 4px;
      min-width: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex: none;
      margin-top: 4px;
    }

    .day-count {
      justify-self: start;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .rank-list {
      display: grid;
      gap: 0;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
    }

    .rank-row:last-child { border-bottom: 0; }

    .rank-no {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #efe7d5;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #655235;
      font-size: 12px;
    }

    .rank-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 750;
    }

    .achievers {
      margin-top: 18px;
    }

    .goal {
      color: var(--good);
      font-weight: 800;
    }

    .empty-state {
      padding: 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 940px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
      }

      main {
        padding: 18px;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: start;
        flex-direction: column;
      }

      .weekdays,
      .days {
        gap: 5px;
      }

      .day {
        min-height: 66px;
        padding: 7px;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <div class="mark">독</div>
        <div>
          <h1>독서지옥 인증 캘린더</h1>
          <p class="sub">카카오톡 사진 인증 기준</p>
        </div>
      </div>

      <div class="toolbar">
        <label class="field">
          월 선택
          <select id="monthSelect"></select>
        </label>
      </div>

      <div class="summary">
        <div class="metric">
          <strong id="monthTotal">0</strong>
          <span>이번 달 인증</span>
        </div>
        <div class="metric">
          <strong id="goalTotal">0</strong>
          <span>목표 달성</span>
        </div>
      </div>

      <div id="personList" class="person-list"></div>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2 id="pageTitle">인증 현황</h2>
          <p class="sub" id="rangeText"></p>
        </div>
        <div class="selected-pill" id="selectedText">전체 인증 보기</div>
      </div>

      <div class="layout">
        <section class="panel">
          <div class="panel-head">
            <h3 id="calendarTitle">캘린더</h3>
            <span class="hint">이름을 클릭하면 해당 날짜만 강조됩니다</span>
          </div>
          <div class="calendar">
            <div class="weekdays">
              <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div class="days" id="calendar"></div>
          </div>
        </section>

        <section>
          <div class="panel">
            <div class="panel-head">
              <h3>많이 읽은 순위</h3>
              <span class="hint">월 10회 목표</span>
            </div>
            <div id="ranking" class="rank-list"></div>
          </div>

          <div class="panel achievers">
            <div class="panel-head">
              <h3>성과 달성자</h3>
              <span class="hint">10회 이상</span>
            </div>
            <div id="achievers" class="rank-list"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

    const state = {
      month: "",
      selectedName: "전체"
    };

    const $ = (id) => document.getElementById(id);
    const monthLabel = (month) => {
      const [year, m] = month.split("-");
      return `${year}년 ${Number(m)}월`;
    };

    const months = [...new Set(events.map((event) => event.date.slice(0, 7)))].sort();
    state.month = months[months.length - 1];

    function eventsForMonth(month) {
      return events.filter((event) => event.date.startsWith(month));
    }

    function countsByName(monthEvents) {
      const counts = new Map();
      monthEvents.forEach((event) => counts.set(event.name, (counts.get(event.name) || 0) + 1));
      return [...counts.entries()]
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, "ko"));
    }

    function renderMonthSelect() {
      $("monthSelect").innerHTML = months
        .map((month) => `<option value="${month}">${monthLabel(month)}</option>`)
        .join("");
      $("monthSelect").value = state.month;
      $("monthSelect").addEventListener("change", (event) => {
        state.month = event.target.value;
        render();
      });
    }

    function renderPeople(monthEvents, counts) {
      const rows = [{ name: "전체", count: monthEvents.length }, ...counts];
      $("personList").innerHTML = rows.map((item) => {
        const active = item.name === state.selectedName ? " active" : "";
        const ok = item.count >= 10 && item.name !== "전체" ? " ok" : "";
        return `<button class="person${active}" data-name="${escapeHtml(item.name)}">
          <span class="person-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span>
          <span class="badge${ok}">${item.count}</span>
        </button>`;
      }).join("");

      document.querySelectorAll(".person").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedName = button.dataset.name;
          render();
        });
      });
    }

    function renderCalendar(monthEvents) {
      const selectedEvents = state.selectedName === "전체"
        ? monthEvents
        : monthEvents.filter((event) => event.name === state.selectedName);
      const dateMap = new Map();
      selectedEvents.forEach((event) => {
        if (!dateMap.has(event.date)) dateMap.set(event.date, []);
        dateMap.get(event.date).push(event);
      });

      const [year, month] = state.month.split("-").map(Number);
      const firstDay = new Date(year, month - 1, 1).getDay();
      const lastDate = new Date(year, month, 0).getDate();
      const cells = [];

      for (let i = 0; i < firstDay; i++) cells.push('<div class="day empty"></div>');

      for (let day = 1; day <= lastDate; day++) {
        const date = `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const list = dateMap.get(date) || [];
        const className = list.length > 1 ? "day multi" : list.length === 1 ? "day hit" : "day";
        const dots = list.slice(0, 8).map(() => '<span class="dot"></span>').join("");
        const label = list.length ? `<span class="day-count">${list.length}회</span>` : "";
        const title = list.length
          ? ` title="${escapeHtml(list.map((event) => `${event.name} ${event.time}`).join("\\n"))}"`
          : "";
        cells.push(`<div class="${className}"${title}>
          <span class="num">${day}</span>
          <div class="names">${dots}</div>
          ${label}
        </div>`);
      }

      $("calendar").innerHTML = cells.join("");
    }

    function renderRanking(counts) {
      $("ranking").innerHTML = counts.length
        ? counts.map((item, index) => rankRow(index + 1, item)).join("")
        : '<div class="empty-state">이 달에는 인증 기록이 없습니다.</div>';

      const achievers = counts.filter((item) => item.count >= 10);
      $("achievers").innerHTML = achievers.length
        ? achievers.map((item, index) => rankRow(index + 1, item, true)).join("")
        : '<div class="empty-state">아직 10회 이상 달성자가 없습니다.</div>';
    }

    function rankRow(rank, item, achieved = false) {
      return `<div class="rank-row">
        <span class="rank-no">${rank}</span>
        <span class="rank-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span>
        <span class="${achieved ? "goal" : ""}">${item.count}회</span>
      </div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function render() {
      const monthEvents = eventsForMonth(state.month);
      const counts = countsByName(monthEvents);
      if (state.selectedName !== "전체" && !counts.some((item) => item.name === state.selectedName)) {
        state.selectedName = "전체";
      }

      $("pageTitle").textContent = `${monthLabel(state.month)} 인증 현황`;
      $("rangeText").textContent = `총 ${events.length}건 · ${months[0]}부터 ${months[months.length - 1]}까지`;
      $("calendarTitle").textContent = state.selectedName === "전체" ? "전체 캘린더" : `${state.selectedName} 캘린더`;
      $("selectedText").textContent = state.selectedName === "전체" ? "전체 인증 보기" : `${state.selectedName} 선택 중`;
      $("monthTotal").textContent = monthEvents.length;
      $("goalTotal").textContent = counts.filter((item) => item.count >= 10).length;

      renderPeople(monthEvents, counts);
      renderCalendar(monthEvents);
      renderRanking(counts);
    }

    renderMonthSelect();
    render();
  </script>
