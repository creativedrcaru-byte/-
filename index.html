<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>독서지옥 인증 캘린더</title>
    <style>
    :root {
      color-scheme: light;
      --ink: #243142;
      --muted: #748092;
      --paper: #f5f7fb;
      --panel: rgba(255, 255, 255, 0.92);
      --line: rgba(36, 49, 66, 0.12);
      --teal: #28b7a9;
      --blue: #3b82f6;
      --yellow: #f7c948;
      --coral: #ff7f6e;
      --green: #77c66e;
      --violet: #8b7cf6;
      --shadow: 0 18px 34px rgba(42, 53, 71, 0.15);
      --soft-shadow: 0 10px 22px rgba(42, 53, 71, 0.10);
      font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 12%, rgba(40, 183, 169, 0.18), transparent 26rem),
        radial-gradient(circle at 84% 4%, rgba(255, 127, 110, 0.20), transparent 24rem),
        radial-gradient(circle at 82% 84%, rgba(247, 201, 72, 0.22), transparent 28rem),
        linear-gradient(135deg, #eef7fb 0%, #f9f4e8 48%, #edf7ef 100%);
      color: var(--ink);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background-image:
        linear-gradient(120deg, transparent 0 70%, rgba(59, 130, 246, 0.10) 70% 73%, transparent 73%),
        linear-gradient(45deg, transparent 0 78%, rgba(255, 127, 110, 0.12) 78% 81%, transparent 81%);
      background-size: 240px 180px, 180px 220px;
    }

    button, select { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 22px;
      padding: 22px;
      position: relative;
    }

    aside {
      position: sticky;
      top: 22px;
      height: calc(100vh - 44px);
      overflow: auto;
      padding: 22px 18px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(246, 250, 252, 0.88));
      box-shadow: var(--shadow);
    }

    aside::before {
      content: "";
      display: block;
      height: 8px;
      margin: -22px -18px 18px;
      background: linear-gradient(90deg, var(--teal), var(--yellow) 32%, var(--coral) 62%, var(--blue));
    }

    main {
      min-width: 0;
      padding: 0;
    }

    .brand {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      align-items: center;
      gap: 13px;
      margin-bottom: 20px;
    }

    .mark {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
      box-shadow: 0 10px 18px rgba(40, 183, 169, 0.28);
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 21px;
      line-height: 1.18;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 5px;
    }

    .toolbar {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 0 12px;
      box-shadow: var(--soft-shadow);
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric {
      position: relative;
      overflow: hidden;
      min-height: 88px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      background: white;
      padding: 14px;
      box-shadow: var(--soft-shadow);
    }

    .metric::after {
      content: "";
      position: absolute;
      right: -18px;
      top: -18px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(40, 183, 169, 0.16);
    }

    .metric:nth-child(2)::after { background: rgba(255, 127, 110, 0.18); }

    .metric strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .person-list {
      display: grid;
      gap: 8px;
    }

    .person {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--ink);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 10px 10px 12px;
      cursor: pointer;
      text-align: left;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .person:hover,
    .person.active {
      background: white;
      border-color: rgba(40, 183, 169, 0.38);
      box-shadow: var(--soft-shadow);
      transform: translateY(-1px);
    }

    .person.active {
      box-shadow: inset 5px 0 0 var(--teal), var(--soft-shadow);
    }

    .person-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
      font-size: 14px;
    }

    .badge {
      min-width: 34px;
      height: 28px;
      border-radius: 8px;
      background: #eef1f5;
      color: #455166;
      display: inline-grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
    }

    .badge.ok {
      background: rgba(119, 198, 110, 0.22);
      color: #2f7b38;
    }

    .topbar {
      min-height: 132px;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 18px;
      padding: 28px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(40, 183, 169, 0.94), rgba(59, 130, 246, 0.88)),
        white;
      color: white;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .topbar::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -54px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
    }

    .topbar h2 {
      font-size: 34px;
      line-height: 1.12;
      position: relative;
      z-index: 1;
    }

    .topbar .sub {
      color: rgba(255, 255, 255, 0.78);
      position: relative;
      z-index: 1;
    }

    .selected-pill {
      border: 1px solid rgba(255, 255, 255, 0.48);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.24);
      padding: 10px 14px;
      color: white;
      font-size: 13px;
      font-weight: 800;
      max-width: 100%;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.38fr) minmax(270px, 0.62fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .panel-head {
      min-height: 62px;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(255,255,255,0.92), rgba(247, 201, 72, 0.16));
    }

    .panel-head h3 {
      font-size: 17px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .calendar {
      padding: 16px;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekdays {
      color: #627086;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
    }

    .day {
      min-height: 96px;
      border: 1px solid rgba(36, 49, 66, 0.10);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      padding: 9px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
      box-shadow: 0 8px 16px rgba(42, 53, 71, 0.06);
    }

    .day.empty {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .day.hit {
      background: #eefbf8;
      border-color: rgba(40, 183, 169, 0.48);
      box-shadow: inset 0 4px 0 var(--teal), 0 8px 16px rgba(42, 53, 71, 0.08);
    }

    .day.multi {
      background: #fff8df;
      border-color: rgba(247, 201, 72, 0.86);
      box-shadow: inset 0 4px 0 var(--yellow), 0 8px 16px rgba(42, 53, 71, 0.08);
    }

    .num {
      width: 26px;
      height: 26px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      background: #f1f4f8;
      font-weight: 900;
      font-size: 13px;
    }

    .hit .num { background: rgba(40, 183, 169, 0.16); color: #0f766e; }
    .multi .num { background: rgba(247, 201, 72, 0.28); color: #9a6500; }

    .names {
      display: flex;
      flex-wrap: wrap;
      align-content: start;
      gap: 4px;
      min-width: 0;
    }

    .book-mark {
      flex: none;
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      font-size: 17px;
      line-height: 1;
      filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.75));
    }

    .day-count {
      justify-self: start;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: #566176;
      padding: 3px 7px;
      font-size: 12px;
      font-weight: 900;
    }

    .rank-list {
      display: grid;
      gap: 0;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.62);
    }

    .rank-row:nth-child(4n + 1) .rank-no { background: var(--teal); }
    .rank-row:nth-child(4n + 2) .rank-no { background: var(--yellow); color: #654700; }
    .rank-row:nth-child(4n + 3) .rank-no { background: var(--coral); }
    .rank-row:nth-child(4n + 4) .rank-no { background: var(--blue); }

    .rank-row:last-child { border-bottom: 0; }

    .rank-no {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: white;
      font-size: 12px;
      box-shadow: 0 7px 14px rgba(42, 53, 71, 0.14);
    }

    .rank-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 850;
    }

    .achievers {
      margin-top: 18px;
    }

    .goal {
      color: #2f7b38;
      font-weight: 900;
    }

    .empty-state {
      padding: 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .app {
        padding: 12px;
        gap: 12px;
      }

      .brand {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .mark {
        width: 44px;
        height: 44px;
      }

      .topbar {
        min-height: 122px;
        align-items: start;
        flex-direction: column;
        padding: 22px;
      }

      .topbar h2 {
        font-size: 27px;
      }

      .weekdays,
      .days {
        gap: 5px;
      }

      .calendar {
        padding: 10px;
      }

      .day {
        min-height: 76px;
        padding: 6px;
      }

      .num {
        width: 23px;
        height: 23px;
      }

      .book-mark {
        width: 18px;
        height: 18px;
        font-size: 15px;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <div class="mark">독</div>
        <div>
          <h1>독서지옥 인증 캘린더</h1>
        </div>
      </div>

      <div class="toolbar">
        <label class="field">
          월 선택
          <select id="monthSelect"></select>
        </label>
      </div>

      <div class="summary">
        <div class="metric">
          <strong id="monthTotal">0</strong>
          <span>이번 달 인증</span>
        </div>
        <div class="metric">
          <strong id="goalTotal">0</strong>
          <span>목표 달성</span>
        </div>
      </div>

      <div id="personList" class="person-list"></div>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2 id="pageTitle">인증 현황</h2>
          <p class="sub" id="rangeText"></p>
        </div>
        <div class="selected-pill" id="selectedText">전체 인증 보기</div>
      </div>

      <div class="layout">
        <section class="panel">
          <div class="panel-head">
            <h3 id="calendarTitle">캘린더</h3>
            <span class="hint">이름을 클릭하면 해당 날짜만 강조됩니다</span>
          </div>
          <div class="calendar">
            <div class="weekdays">
              <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div class="days" id="calendar"></div>
          </div>
        </section>

        <section>
          <div class="panel">
            <div class="panel-head">
              <h3>많이 읽은 순위</h3>
              <span class="hint">월 10회 목표</span>
            </div>
            <div id="ranking" class="rank-list"></div>
          </div>

          <div class="panel achievers">
            <div class="panel-head">
              <h3>성과 달성자</h3>
              <span class="hint">10회 이상</span>
            </div>
            <div id="achievers" class="rank-list"></div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js?v=20260717-design"></script>
</body>
</html>
