<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>독서지옥 인증 캘린더</title>
    <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #687078;
      --line: #d9ded9;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-2: #f2b84b;
      --good: #16803c;
      --warn: #b45309;
      --soft: #eef7f4;
      --shadow: 0 16px 36px rgba(32, 33, 36, 0.09);
      font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
    }

    button, select { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    aside {
      background: #f4f1e8;
      border-right: 1px solid var(--line);
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    main {
      padding: 28px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .mark {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 21px;
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 0 10px;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .person-list {
      display: grid;
      gap: 6px;
    }

    .person {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      cursor: pointer;
      text-align: left;
    }

    .person:hover,
    .person.active {
      background: white;
      border-color: var(--line);
    }

    .person.active {
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.12);
    }

    .person-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      font-size: 14px;
    }

    .badge {
      min-width: 34px;
      height: 26px;
      border-radius: 999px;
      background: #e8e1d0;
      color: #3e3321;
      display: inline-grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
    }

    .badge.ok {
      background: #d9f2df;
      color: var(--good);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 20px;
    }

    .topbar h2 {
      font-size: 28px;
      line-height: 1.15;
    }

    .selected-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      padding: 9px 13px;
      color: var(--muted);
      font-size: 13px;
      max-width: 100%;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      min-height: 58px;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h3 {
      font-size: 16px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .calendar {
      padding: 16px;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekdays {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }

    .day {
      min-height: 90px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf9;
      padding: 9px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
    }

    .day.empty {
      background: transparent;
      border-color: transparent;
    }

    .day.hit {
      background: var(--soft);
      border-color: rgba(15, 118, 110, 0.45);
    }

    .day.multi {
      background: #fff6df;
      border-color: rgba(242, 184, 75, 0.8);
    }

    .num {
      font-weight: 800;
      font-size: 13px;
    }

    .names {
      display: flex;
      flex-wrap: wrap;
      align-content: start;
      gap: 4px;
      min-width: 0;
    }

    .book-mark {
      flex: none;
      width: 20px;
      height: 20px;
      display: inline-grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
      filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.7));
    }

    .day-count {
      justify-self: start;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .rank-list {
      display: grid;
      gap: 0;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
    }

    .rank-row:last-child { border-bottom: 0; }

    .rank-no {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #efe7d5;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #655235;
      font-size: 12px;
    }

    .rank-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 750;
    }

    .achievers {
      margin-top: 18px;
    }

    .goal {
      color: var(--good);
      font-weight: 800;
    }

    .empty-state {
      padding: 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 940px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
      }

      main {
        padding: 18px;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: start;
        flex-direction: column;
      }

      .weekdays,
      .days {
        gap: 5px;
      }

      .day {
        min-height: 66px;
        padding: 7px;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <div class="mark">독</div>
        <div>
          <h1>독서지옥 인증 캘린더</h1>
          <p class="sub">카카오톡 사진 인증 자동 반영</p>
        </div>
      </div>

      <div class="toolbar">
        <label class="field">
          월 선택
          <select id="monthSelect"></select>
        </label>
      </div>

      <div class="summary">
        <div class="metric">
          <strong id="monthTotal">0</strong>
          <span>이번 달 인증</span>
        </div>
        <div class="metric">
          <strong id="goalTotal">0</strong>
          <span>목표 달성</span>
        </div>
      </div>

      <div id="personList" class="person-list"></div>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2 id="pageTitle">인증 현황</h2>
          <p class="sub" id="rangeText"></p>
        </div>
        <div class="selected-pill" id="selectedText">전체 인증 보기</div>
      </div>

      <div class="layout">
        <section class="panel">
          <div class="panel-head">
            <h3 id="calendarTitle">캘린더</h3>
            <span class="hint">이름을 클릭하면 해당 날짜만 강조됩니다</span>
          </div>
          <div class="calendar">
            <div class="weekdays">
              <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div class="days" id="calendar"></div>
          </div>
        </section>

        <section>
          <div class="panel">
            <div class="panel-head">
              <h3>많이 읽은 순위</h3>
              <span class="hint">월 10회 목표</span>
            </div>
            <div id="ranking" class="rank-list"></div>
          </div>

          <div class="panel achievers">
            <div class="panel-head">
              <h3>성과 달성자</h3>
              <span class="hint">10회 이상</span>
            </div>
            <div id="achievers" class="rank-list"></div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js?v=20260717-books"></script>
</body>
</html>
